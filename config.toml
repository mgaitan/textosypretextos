base_url = "https://textosypretextos.pages.dev"
title = "Textos y Pretextos"
description = "Textos, imágenes y lecturas de Martín Gaitán."
default_language = "es"
compile_sass = false
build_search_index = true
minify_html = true
generate_feeds = true
feed_filenames = ["atom.xml"]

[markdown]
smart_punctuation = true
external_links_target_blank = true
external_links_no_follow = true
external_links_no_referrer = true
render_emoji = false

[extra]
site_owner = "Martín Gaitán"
start_year = 2004
site_description = "Un cuaderno abierto de lecturas, canciones y hallazgos."
github_repo = "mgaitan/textosypretextos"
github_branch = "main"
