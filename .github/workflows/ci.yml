name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zola
        run: |
          ZOLA_VERSION=0.22.1
          curl -sLo /tmp/zola.tar.gz "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          sudo tar -xzf /tmp/zola.tar.gz -C /usr/local/bin
          zola --version

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CSS/JS
        run: npm run build:assets

      - name: Build site
        run: zola build

  spell-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install hunspell and es_AR dictionary
        run: |
          sudo apt-get update -q
          sudo apt-get install -y hunspell hunspell-es

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run spell check
        run: uv run scripts/check_spelling.py
