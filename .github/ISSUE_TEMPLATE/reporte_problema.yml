name: Reporte de problema
description: Reportar un error o problema en un artículo del sitio
labels: ["problema"]
body:
  - type: input
    id: url
    attributes:
      label: URL del artículo
      description: Dirección web de la página donde encontraste el problema
      placeholder: "https://textosypretextos.com.ar/..."
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Fuente
      description: Ruta del archivo fuente en el repositorio
      placeholder: "content/blog/..."
    validations:
      required: false
  - type: textarea
    id: descripcion
    attributes:
      label: Descripción del problema
      description: Explicá con detalle qué está mal o qué mejorarías
      placeholder: "El problema es..."
    validations:
      required: true
